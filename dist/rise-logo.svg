<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 960" role="img" aria-labelledby="title desc">
  <title id="title">RISE Investment Company logo</title>
  <desc id="desc">Green leaf and yellow crescent logo with RISE Investment Company text.</desc>
  <defs>
    <linearGradient id="greenA" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#3cff23"/>
      <stop offset="0.48" stop-color="#07a80f"/>
      <stop offset="1" stop-color="#016b0b"/>
    </linearGradient>
    <linearGradient id="greenB" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#53ff2e"/>
      <stop offset="0.55" stop-color="#08ad12"/>
      <stop offset="1" stop-color="#005d09"/>
    </linearGradient>
    <linearGradient id="yellowA" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fff65a"/>
      <stop offset="0.55" stop-color="#ffd200"/>
      <stop offset="1" stop-color="#f0a800"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
